services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: custodia
      POSTGRES_PASSWORD: custodia
      POSTGRES_DB: custodia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U custodia"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./docker/keycloak/realm:/opt/keycloak/data/import
    healthcheck:
      # curl is not present in the UBI 9 minimal base; use bash /dev/tcp instead.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q 'UP' <&3"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP receiver

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      CUSTODIA_ENV: local
      CUSTODIA_SERVICE_NAME: custodia-server
      CUSTODIA_DEBUG: "false"
      CUSTODIA_LOG_LEVEL: INFO
      DATABASE_URL: postgresql://custodia:custodia@postgres:5432/custodia
      KEYCLOAK_REALM: custodia
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_CLIENT_ID: custodia-server
      JAEGER_ENDPOINT: http://jaeger:4318
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # curl is not present in python:3.12-slim; use the stdlib urllib instead.
      test: ["CMD", "/app/.venv/bin/python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
